build:
  gpu: true
  cuda: "12.4"
  python_version: "3.11"
  python_packages:
    - "torch==2.6.0"
    - "torchvision==0.21.0"
    - "huggingface_hub>=0.24.0"
    - "terratorch>=1.2.7"
    - "pydantic>=2.0,<3"
    - "albumentations>=1.4.0"
    - "numpy>=1.26.0"
    - "pillow>=10.0.0"
    - "rasterio>=1.3.0"
    - "tifffile>=2024.0.0"
  system_packages:
    - libgl1
    - libglib2.0-0
    - gdal-bin
    - libgdal-dev
  run:
    - command: python -c "from huggingface_hub import snapshot_download; snapshot_download(repo_id='ibm-esa-geospatial/TerraMind-1.0-Tokenizer-NDVI', cache_dir='/src/hf-cache', token=open('/run/secrets/HF_TOKEN').read().strip())"
      mounts:
        - type: secret
          id: HF_TOKEN
          target: /run/secrets/HF_TOKEN

predict: "predict.py:Predictor"
